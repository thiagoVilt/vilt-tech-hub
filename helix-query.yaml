indices:
  properties:
    # Mude 'source' para 'include' e use o padrão de glob (**)
    include:
      - /properties/**
    target: /query-index.json
    properties:
      title:
        select: head > title
        value: text
      description:
        select: meta[name="description"]
        value: attribute(content)
      image:
        select: meta[property="og:image"]
        value: attribute(content)
      category:
        select: meta[name="category"]
        value: attribute(content)
      price:
        select: meta[name="price"]
        value: attribute(content)